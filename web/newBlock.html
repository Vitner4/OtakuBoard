<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="source/img/OtakuBoard-ico.png" type="image/png">
    <title>OtakuBoard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/textStyles.css">
    <script src="js/inputFileScript.js" defer></script>
    <script src="js/inputFileScript.js" defer></script>
</head>
<body>
    <header>
        <div id="logo"><img src="source/img/OtakuBoard-mesh-ico.png" alt="logo"></div>
        <a id="header-title-style" href="listPage.html">Главная</a>
        <nav>
            <ul>
                <li><a id="header-text-style" href="#">Мои группы</a></li>
                <li><a id="header-text-style" href="newBlock.html">Создать</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <a class="account-button" href="authorization.html">
            <i class="account-icon"></i>
            <!-- Или используйте иконку из библиотеки (Font Awesome, Material Icons и т.д.) -->
            </a>
        </div>
    </header>
    <main>
        <section>
            <div class="base-win">
                <div class="mine-selector">
                    <h1 class="text-preview">Создание новых "блоков"</h1>
                    <div class="upload-container" id="upload-area">
                        <div class="upload-icon">+</div>
                        <div class="upload-text">Загрузите картинку для превью</div>
                        <img id="preview" alt="Превью">
                        <input type="file" id="file-input" accept="image/*">
                    </div>
                    <div class="new-tile-data">
                        <label class="text-stl">Рейтинг</label>
                        <div class="rating">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                            <span class="star" data-value="6">★</span>
                            <span class="star" data-value="7">★</span>
                            <span class="star" data-value="8">★</span>
                            <span class="star" data-value="9">★</span>
                            <span class="star" data-value="10">★</span>
                            <span class="rating-value">0 из 10</span>
                        </div>
                        <label class="text-stl">Название</label>
                        <input class="input-description-lile" type="text" id="name-title" placeholder="Заглушка">
                        <label class="text-stl">Описание</label>
                        <textarea class="input-description-lile-huge" type="text" id="dascription-title" placeholder="Заглушка"></textarea>
                        <label class="text-stl">Тип контента</label>
                        <div class="select-wrapper">
                            <select class="tile-select-data" id="">
                                <option class="tile-select-data-tile" value=""></option>
                                <option class="tile-select-data-tile" value="option1">Вариант 1</option>
                                <option class="tile-select-data-tile" value="option2">Вариант 2</option>
                                <option class="tile-select-data-tile" value="option3">Вариант 3</option>
                            </select>
                        </div>
                        <label class="text-stl">бла</label>
                        <input class="input-description-lile" type="text" id="#" placeholder="Заглушка">
                        <label class="text-stl">бла</label>
                        <input class="input-description-lile" type="text" id="#" placeholder="Заглушка">
                        <label class="text-stl">бла</label>
                        <input class="input-description-lile" type="text" id="#" placeholder="Заглушка">
                        <label class="text-stl">бла</label>
                        <input class="input-description-lile" type="text" id="#" placeholder="Заглушка">


                        <button class="button-save-data">Сохранить</button>


                    </div>
                </div>
                <div class="search-selector">
                    
                </div>
            </div>    
        </section>
        

    </main>
    
    <footer>
        <p>&copy; 2025 Мой сайт. Все права защищены.</p>
    </footer>
</body>
</html>
