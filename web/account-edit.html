<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="OtakuBoard">
    <title>OtakuBoard</title>
    <link rel="icon" href="css/src/ico/OtakuBoard-ico.png" type="image/png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/account-edit.css">
</head>

<body>
    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="header-content">
            <div class="branding">
                <a id="github-link" href="#" class="logo-title-group" target="_blank" rel="noopener noreferrer">
                    <img src="css/src/ico/OtakuBoard-ico.png" alt="Логотип" class="logo-img">
                    <h1 class="page-title">OtakuBoard</h1>
                </a>
            </div>   

            <nav class="site-nav">
                <ul>
                    <li><a href="list-page.html">Главная</a></li>
                    <!-- <li><a href="group.html">Группы</a></li> -->
                    <li><a href="create-card.html">Создать</a></li>
                    <li><a id="selected-page" href="account.html">Аккаунт</a></li>
                    <li><a href="settings.html">Настройки</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Блок аккаунта пользователя -->
    <div class="account-form">
        <div id="account-btn-container">
            <p id="status"></p>
            <button id="account-edit" title="Сохранить изменения">Сохранить</button>
            <a href="account.html"><button id="account-edit-cancel" title="Отменить изменения">Отменить</button></a>
        </div>
        <div class="account-data">
            <div id="cover-preview">
                <div id="cover-placeholder">
                    <p id="cover-message">Предпросмотр аватара появится здесь</p>
                </div>
                <img src="" alt="" id="account-avatar">
            </div>
            <label>Имя:</label>
            <input type="text" id="name" name="name" placeholder="Укажите имя аккаунта" value="">

            <label>Аватар аккаунта:</label>
            <input type="file" id="cover" name="cover" accept="image/*" style="cursor: pointer;">
            <input type="text" id="cover-link" name="cover-link" placeholder="Или укажите URL-ссылку на аватар">
            
            <button type="button" class="btn" id="cover-remove">Убрать аватар</button>
        </div>
    </div>

    <!-- Подвал сайта -->
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-section">
                <p class="copyright">&copy; <span id="current-year"></span> OtakuBoard</p>
            </div>

            <div class="footer-section">
                <a href="license.html" class="footer-link">Лицензионное соглашение</a>
            </div>

            <div class="footer-section">
                <a href="about-us.html" class="footer-link">О нас</a>
            </div>
        </div>
    </footer>

    <!-- JS импорт -->
    <script src="/eel.js"></script>
    <script src="js/script.js"></script>
    <script type="module" src="js/account-edit.js"></script>
</body>
</html>
