<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="source/img/OtakuBoard-ico.png" type="image/png">
    <title>OtakuBoard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/textStyles.css">
    <link rel="stylesheet" href="css/tile.css">
    <script src="js/inputFileScript.js" defer></script>
    <script src="js/tileDIEScript.js" defer></script>
</head>
<body>
    <header>
        <div class="logo"><img src="source/img/OtakuBoard-mesh-ico.png" alt="logo"></div>
        <a class="logo-text" href="listPage.html">Главная</a>
        <nav>
            <ul>
                <li><a class="head-text" href="#">Группы</a></li>
                <li><a class="head-text" href="newBlock.html">Новая запись</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <a class="account-button" href="authorization.html">
            <i class="account-icon"></i>
            <!-- Или используйте иконку из библиотеки (Font Awesome, Material Icons и т.д.) -->
            </a>
        </div>
    </header>
    
    <main>
        <div class="autorize-window">
            <div class="account-selector">
                <h2>Выберите аккаунт</h2>
                <ul class="account-list">
                    <li class="account-item">
                        <div class="account-avatar">ИФ</div>
                        <div class="account-info">
                            <div class="account-name">Иван Фролов</div>
                            <div class="account-id"></div>
                        </div>
                    </li>
                    <li class="account-item">
                        <div class="account-avatar">АС</div>
                        <div class="account-info">
                            <div class="account-name">Анна Смирнова</div>
                            <div class="account-id"></div>
                        </div>
                    </li>
                    <li class="account-item">
                        <div class="account-avatar">ПК</div>
                        <div class="account-info">
                            <div class="account-name">Пётр Кузнецов</div>
                            <div class="account-id"></div>
                        </div>
                    </li>
                </ul>
                <a href="#" class="new-account">
                    <i>+</i> Добавить новый аккаунт
                </a>                
            </div>
        </div>        
    </main>
    
    <footer>
        <p>&copy; 2025 Мой сайт. Все права защищены.</p>
    </footer>
</body>
</html>
