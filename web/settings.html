<!DOCTYPE html>

<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="OtakuBoard">
    <title>OtakuBoard</title>
    <link rel="icon" href="css/src/ico/OtakuBoard-ico.png" type="image/png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/settings.css">
</head>

<body>
    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="header-content">

            <div class="branding">
                <a id="github-link" href="#" class="logo-title-group">
                    <img src="css/src/ico/OtakuBoard-ico.png" alt="Логотип" class="logo-img">
                    <h1 class="page-title">OtakuBoard</h1>
                </a>
            </div>   

            <nav class="site-nav">
                <ul>
                    <li><a href="list-page.html">Главная</a></li>
                    <li><a href="group.html">Группы</a></li>
                    <li><a href="create.html">Создать</a></li>
                    <li><a href="account.html">Аккаунт</a></li>
                    <li><a id="selected-page" href="settings.html">Настройки</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- Блок настроек приложения -->
     <div class="settings-form">
        <h1 id="title">Настройки приложения</h1>
        <div class="settings-data-block">
            <div class="settings-data"> 
                <p id="dark-mode-p">Тёмная тема</p>
                <label class="switch"><input type="checkbox" id="dark-mode-toggle"><span class="slider round"></span></label>
            </div>

            <div class="settings-data"> 
                <p id="dark-mode-p" >Градиент у карточек</p>
                <label class="switch"><input type="checkbox" id="dark-mode-toggle" checked><span class="slider round"></span></label>
            </div>

            <div class="settings-data"> 
                <p id="language-select-p">Язык интерфейса</p>
                <select id="language-select">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <p id="app-version">Version 0.1</p>
        </div>  
     </div>

    <!-- Подвал сайта -->
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-section">
                <p class="copyright">&copy; <span id="current-year"></span> OtakuBoard</p>
            </div>

            <div class="footer-section">
                <a href="license.html" class="footer-link">Лицензионное соглашение</a>
            </div>

            <div class="footer-section">
                <a href="about-us.html" class="footer-link">О нас</a>
            </div>
        </div>
    </footer>

    <!-- JS импорт -->
    <script src="script.js"></script>
    <script src="settings.js"></script>

    <!-- <script>
        document.getElementById('dark-mode-toggle').addEventListener('change', function(e) {
            console.log('Значение переключателя:', e.target.checked);
        });
    </script> -->
</body>

</html>
